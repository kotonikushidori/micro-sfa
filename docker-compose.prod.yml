services:
  app:
    build:
      context: .
      target: production
    container_name: micro-sfa-app
    ports:
      - "127.0.0.1:8989:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: "/data/sfa.db"
    volumes:
      - db-data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy-net
      - default

volumes:
  db-data:

networks:
  proxy-net:
    external: true
