services:
  app:
    build:
      context: .
      target: production
    container_name: micro-sfa-app
    ports:
      - "127.0.0.1:8989:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy-net
      - default

networks:
  proxy-net:
    external: true
