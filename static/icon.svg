<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- 背景（角丸正方形） -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 棒グラフ（3本・高さ増加） -->
  <rect x="96"  y="296" width="88" height="152" rx="12" fill="white" opacity="0.65"/>
  <rect x="212" y="196" width="88" height="252" rx="12" fill="white" opacity="0.82"/>
  <rect x="328" y="112" width="88" height="336" rx="12" fill="white"/>
  <!-- 上昇トレンドライン -->
  <polyline points="116,316 256,216 416,132"
    fill="none" stroke="white" stroke-width="18"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
