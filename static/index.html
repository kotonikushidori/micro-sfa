<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>micro-SFA</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <header id="app-header" class="hidden">
    <div class="header-inner">
      <span class="app-title">micro-SFA</span>
      <nav id="app-nav"></nav>
      <div class="header-right">
        <div id="user-menu" class="user-menu">
          <button id="user-menu-btn" class="user-menu-btn">
            <span id="current-user-label"></span>
            <span class="user-menu-chevron">▾</span>
          </button>
          <div id="user-menu-dropdown" class="user-menu-dropdown">
            <button id="logout-btn" class="user-menu-item">ログアウト</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="app-root"></main>
  <nav id="bottom-nav" class="bottom-nav hidden"></nav>

  <!-- ES Modules エントリーポイント -->
  <script type="module" src="/app.js"></script>
</body>
</html>
